<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Grammar Master - Học Tiếng Anh</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --bg: #f5f0ff;
      --card-bg: #ffffff;
      --accent: #7c3aed;
      --accent-light: #ede9fe;
      --accent2: #ec4899;
      --slot-bg: #ede9fe;
      --slot-border: #a78bfa;
      --correct: #bbf7d0;
      --correct-border: #16a34a;
      --wrong: #fecdd3;
      --text: #1e1b4b;
      --subtext: #6b7280;
      --shadow: 0 4px 14px rgba(124, 58, 237, 0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 8px 30px;
      overscroll-behavior-y: contain;
      overflow-x: hidden;
    }

    /* === HEADER === */
    .header {
      width: 100%;
      max-width: 680px;
      text-align: center;
      margin-bottom: 8px;
    }

    .title {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .title span {
      color: var(--accent2);
    }

    /* === CONTROLS ROW === */
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      margin: 8px 0;
      flex-wrap: wrap;
    }

    .difficulty-select {
      padding: 8px 14px;
      border-radius: 20px;
      border: 2px solid var(--accent);
      font-family: 'Nunito';
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--accent);
      background: white;
      outline: none;
      cursor: pointer;
    }

    .score-badge {
      background: var(--accent);
      color: white;
      font-weight: 800;
      font-size: 1rem;
      padding: 8px 18px;
      border-radius: 20px;
      box-shadow: var(--shadow);
    }

    /* === INFO PANEL === */
    .info-panel {
      width: 100%;
      max-width: 680px;
      background: white;
      border-radius: 18px;
      padding: 12px 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      border-left: 5px solid var(--accent2);
    }

    .info-translation {
      font-size: 1.05rem;
      font-weight: 700;
      color: #be185d;
      margin-bottom: 5px;
    }

    .info-tense {
      display: inline-block;
      font-size: 0.82rem;
      font-weight: 800;
      background: var(--accent-light);
      color: var(--accent);
      padding: 3px 12px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .info-hint {
      font-size: 0.95rem;
      font-weight: 700;
      margin-top: 5px;
      color: var(--subtext);
      min-height: 22px;
    }

    .info-hint.success {
      color: #16a34a;
    }

    /* === DROP ZONE === */
    .sentence-display {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      width: 100%;
      max-width: 680px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 20px;
      padding: 14px 12px;
      min-height: 80px;
      margin-bottom: 10px;
      border: 2px dashed #c4b5fd;
    }

    .word-slot {
      min-width: 60px;
      padding: 6px 8px;
      height: 52px;
      border: 2px dashed var(--slot-border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--slot-bg);
      transition: background 0.2s, border-color 0.2s;
      font-size: 0.9rem;
    }

    .word-slot.filled {
      border-style: solid;
      border-color: var(--accent);
      background: white;
    }

    .word-slot.correct-blink {
      background: var(--correct) !important;
      border-color: var(--correct-border) !important;
      animation: pulse-slot 0.45s 2;
    }

    @keyframes pulse-slot {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.08);
      }
    }

    /* === WORD POOL === */
    .word-pool {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 14px 10px;
      width: 100%;
      max-width: 680px;
      border-top: 2px solid #ddd6fe;
      min-height: 100px;
    }

    /* === CARDS === */
    .card {
      padding: 9px 14px;
      background: white;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: grab;
      box-shadow: 0 4px 0 rgba(124, 58, 237, 0.18);
      border: 2px solid #e9d5ff;
      user-select: none;
      /* ANDROID: none blocks all touch gestures so pointer events fire cleanly */
      touch-action: none;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
      /* ANDROID: promote to own compositor layer for smooth dragging */
      will-change: transform;
      /* ANDROID: isolate paint so moving card doesn't repaint the whole page */
      contain: layout style;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    .card:hover {
      border-color: var(--accent);
    }

    .card.dragging {
      opacity: 0.75;
      transform: scale(1.1) rotate(2deg);
      pointer-events: none;
      position: fixed;
      z-index: 1000;
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.28);
      border-color: var(--accent);
      /* ANDROID: keep on GPU layer while flying */
      will-change: left, top;
      contain: strict;
    }

    /* === FOOTER BUTTON === */
    .footer {
      margin-top: 14px;
    }

    .btn-next {
      padding: 12px 36px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-family: 'Nunito';
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.35);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    }

    .btn-next:active:not(:disabled) {
      transform: scale(0.96);
    }

    /* Feature 2: disabled state */
    .btn-next:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* === TENSE LABEL MAP === */
    /* colors per tense */
    .tense-present_simple {
      background: #d1fae5;
      color: #065f46;
    }

    .tense-past_simple {
      background: #fef3c7;
      color: #92400e;
    }

    .tense-present_continuous {
      background: #dbeafe;
      color: #1e40af;
    }

    .tense-present_perfect {
      background: #d1fae5;
      color: #065f46;
    }

    .tense-present_perfect_continuous {
      background: #a7f3d0;
      color: #064e3b;
    }

    .tense-past_continuous {
      background: #fef9c3;
      color: #854d0e;
    }

    .tense-past_perfect {
      background: #fde68a;
      color: #78350f;
    }

    .tense-past_perfect_continuous {
      background: #fed7aa;
      color: #7c2d12;
    }

    .tense-future_simple {
      background: #e0e7ff;
      color: #3730a3;
    }

    .tense-future_going_to {
      background: #c7d2fe;
      color: #312e81;
    }

    .tense-future_continuous {
      background: #ddd6fe;
      color: #4c1d95;
    }

    .tense-future_perfect {
      background: #ede9fe;
      color: #6b21a8;
    }

    .tense-future_perfect_continuous {
      background: #f3e8ff;
      color: #7e22ce;
    }
  </style>
</head>

        { en: ["She", "is", "going", "to", "cook", "a", "big", "dinner"], vi: "Cô ấy sắp nấu một bữa tối thịnh soạn.", tense: "future_going_to" },
        { en: ["He", "is", "going", "to", "travel", "around", "the", "world"], vi: "Anh ấy sắp đi du lịch vòng quanh thế giới.", tense: "future_going_to" },
        { en: ["They", "are", "going", "to", "build", "a", "new", "school"], vi: "Họ sắp xây dựng một ngôi trường mới.", tense: "future_going_to" },
        { en: ["We", "are", "going", "to", "win", "this", "important", "match"], vi: "Chúng ta sắp thắng trận đấu quan trọng này rồi.", tense: "future_going_to" },
        { en: ["Are", "you", "going", "to", "take", "the", "English", "exam"], vi: "Bạn có sắp tham gia kỳ thi tiếng Anh không?", tense: "future_going_to" },
        { en: ["It", "is", "going", "to", "rain", "heavily", "this", "afternoon"], vi: "Chiều nay trời sắp mưa to rồi.", tense: "future_going_to" },
        // Future Continuous - Hard (8 words)
        { en: ["I", "will", "be", "studying", "English", "at", "eight", "tomorrow"], vi: "Ngày mai lúc tám giờ tôi sẽ đang học tiếng Anh.", tense: "future_continuous" },
        { en: ["She", "will", "be", "working", "at", "the", "office", "tomorrow"], vi: "Ngày mai cô ấy sẽ đang làm việc ở văn phòng.", tense: "future_continuous" },
        { en: ["He", "will", "be", "traveling", "to", "Japan", "next", "week"], vi: "Tuần tới anh ấy sẽ đang trên đường đi Nhật Bản.", tense: "future_continuous" },
        { en: ["They", "will", "be", "playing", "football", "at", "five", "o'clock"], vi: "Lúc năm giờ họ sẽ đang chơi bóng đá.", tense: "future_continuous" },
        { en: ["We", "will", "be", "having", "dinner", "when", "you", "arrive"], vi: "Chúng tôi sẽ đang ăn tối khi bạn đến nơi.", tense: "future_continuous" },
        { en: ["Will", "she", "be", "studying", "at", "the", "library", "tonight"], vi: "Tối nay cô ấy có đang học ở thư viện không?", tense: "future_continuous" },
        // Future Perfect - Hard (8 words)
        { en: ["I", "will", "have", "finished", "this", "book", "by", "Friday"], vi: "Đến thứ Sáu tôi sẽ đọc xong cuốn sách này.", tense: "future_perfect" },
        { en: ["She", "will", "have", "graduated", "from", "school", "by", "June"], vi: "Đến tháng Sáu cô ấy sẽ đã tốt nghiệp trường.", tense: "future_perfect" },
        { en: ["He", "will", "have", "learned", "English", "for", "ten", "years"], vi: "Anh ấy sẽ đã học tiếng Anh được mười năm.", tense: "future_perfect" },
        { en: ["They", "will", "have", "built", "the", "new", "school", "soon"], vi: "Họ sẽ đã xây xong ngôi trường mới sớm thôi.", tense: "future_perfect" },
        { en: ["We", "will", "have", "completed", "the", "project", "by", "Monday"], vi: "Đến thứ Hai chúng tôi sẽ đã hoàn thành dự án.", tense: "future_perfect" },
        { en: ["Will", "you", "have", "read", "this", "book", "by", "tomorrow"], vi: "Ngày mai bạn có đọc xong cuốn sách này không?", tense: "future_perfect" },
        // Future Perfect Continuous - Hard (8 words)
        { en: ["I", "will", "have", "been", "studying", "English", "for", "years"], vi: "Tôi sẽ đã học tiếng Anh liên tục nhiều năm rồi.", tense: "future_perfect_continuous" },
        { en: ["She", "will", "have", "been", "working", "here", "for", "decades"], vi: "Cô ấy sẽ đã làm việc ở đây liên tục nhiều thập kỷ.", tense: "future_perfect_continuous" },
        { en: ["He", "will", "have", "been", "teaching", "at", "the", "school"], vi: "Anh ấy sẽ đã đang dạy học ở trường liên tục.", tense: "future_perfect_continuous" },
        { en: ["They", "will", "have", "been", "living", "here", "for", "decades"], vi: "Họ sẽ đã sống ở đây liên tục nhiều thập kỷ.", tense: "future_perfect_continuous" },
        { en: ["We", "will", "have", "been", "practicing", "English", "for", "months"], vi: "Chúng tôi sẽ đã luyện tiếng Anh liên tục nhiều tháng.", tense: "future_perfect_continuous" },
      ]
    };

    // ─── FEATURE 3: TEXT-TO-SPEECH ────────────────────────────────────────────────
    // Speak an English word using the Web Speech API (works on Android Chrome)
    function speakWord(word) {
      if (!window.speechSynthesis) return;
      // Cancel any in-progress speech immediately to avoid overlap
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(word);
      utt.lang = 'en-US';
      utt.rate = 0.9;
      utt.pitch = 1;
      // Prefer an English voice if available
      const voices = window.speechSynthesis.getVoices();
      const enVoice = voices.find(v => v.lang === 'en-US') ||
        voices.find(v => v.lang === 'en-GB') ||
        voices.find(v => v.lang.startsWith('en'));
      if (enVoice) utt.voice = enVoice;
      window.speechSynthesis.speak(utt);
    }

    // ─── FISHER-YATES SHUFFLE ─────────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ─── STATE ────────────────────────────────────────────────────────────────────
    let currentSentenceData = {};
    let userProgress = [];
    let score = 0;
    let activeCard = null;
    let startParent = null;
    let offset = { x: 0, y: 0 };
    let activePointerId = null; // FEATURE 1: track pointer for Android
    let sentenceQueues = { easy: [], medium: [], hard: [] }; // non-repeating queues per difficulty

    // ─── NEXT LEVEL ───────────────────────────────────────────────────────────────
    function nextLevel() {
      // FEATURE 2: disable the Next button until sentence is solved
      document.getElementById('btn-next').disabled = true;

      const diff = document.getElementById('difficulty').value;
      const currentLib = library[diff];
      if (sentenceQueues[diff].length === 0) {
        const filter = document.getElementById('tense-filter').value;
        const filtered = filter === 'all' ? currentLib
          : filter === 'question' ? currentLib.filter(s => s.tense.includes('question'))
            : filter === 'negative' ? currentLib.filter(s => s.tense.includes('negative'))
              : currentLib.filter(s => s.tense === filter);
        sentenceQueues[diff] = shuffle(filtered.length > 0 ? filtered : currentLib);
      }
      currentSentenceData = sentenceQueues[diff].pop();

      // Translation
      document.getElementById('translation-text').textContent = '📖 Dịch: ' + currentSentenceData.vi;

      // Tense label
      const tenseEl = document.getElementById('tense-label');
      const tenseKey = currentSentenceData.tense;
      tenseEl.textContent = TENSE_LABELS[tenseKey] || tenseKey;
      tenseEl.className = 'info-tense tense-' + tenseKey;

      // Hint reset
      const hintEl = document.getElementById('hint-text');
      hintEl.textContent = 'Kéo các từ vào đúng vị trí!';
      hintEl.className = 'info-hint';

      userProgress = new Array(currentSentenceData.en.length).fill(null);

      const dropZone = document.getElementById('drop-zone');
      const pool = document.getElementById('pool');
      dropZone.innerHTML = '';
      pool.innerHTML = '';

      // Build slots
      currentSentenceData.en.forEach((_, index) => {
        const slot = document.createElement('div');
        slot.className = 'word-slot';
        slot.dataset.index = index;
        dropZone.appendChild(slot);
      });

      // Build word cards (shuffled)
      shuffle(currentSentenceData.en).forEach(word => {
        const card = document.createElement('div');
        card.className = 'card';
        card.textContent = word;
        card.addEventListener('pointerdown', onStart);
        pool.appendChild(card);
      });
    }

    // ─── DRAG SYSTEM ─────────────────────────────────────────────────────────────
    function onStart(e) {
      if (e.pointerType === 'touch') e.preventDefault();
      activeCard = e.currentTarget;
      startParent = activeCard.parentElement;
      activePointerId = e.pointerId; // FEATURE 1: capture pointer for Android

      if (startParent.classList.contains('word-slot')) {
        userProgress[parseInt(startParent.dataset.index)] = null;
        startParent.classList.remove('filled');
      }

      sfx.drag.currentTime = 0;
      sfx.drag.play().catch(() => { });

      // FEATURE 3: speak the word being dragged
      speakWord(activeCard.textContent.trim());

      const rect = activeCard.getBoundingClientRect();
      offset = { x: e.pageX - rect.left, y: e.pageY - rect.top };
      activeCard.classList.add('dragging');
      activeCard.style.width = rect.width + 'px';
      // FEATURE 1: capture pointer so Android doesn't lose track mid-drag
      activeCard.setPointerCapture(activePointerId);
      moveAt(e.pageX, e.pageY);

      document.addEventListener('pointermove', onMove, { passive: false });
      document.addEventListener('pointerup', onEnd);
    }

    function moveAt(x, y) {
      if (!activeCard) return;
      activeCard.style.left = (x - offset.x) + 'px';
      activeCard.style.top = (y - offset.y) + 'px';
    }

    function onMove(e) {
      if (activeCard) { e.preventDefault(); moveAt(e.pageX, e.pageY); }
    }

    function onEnd(e) {
      if (!activeCard) return;

      const slots = document.querySelectorAll('.word-slot');
      const pool = document.getElementById('pool');
      const poolRect = pool.getBoundingClientRect();
      let placed = false;

      slots.forEach(slot => {
        const r = slot.getBoundingClientRect();
        if (
          e.clientX > r.left && e.clientX < r.right &&
          e.clientY > r.top && e.clientY < r.bottom
        ) {
          const idx = parseInt(slot.dataset.index);
          if (!userProgress[idx]) {
            slot.appendChild(activeCard);
            slot.classList.add('filled');
            userProgress[idx] = activeCard.textContent;
            placed = true;
            sfx.correct.currentTime = 0;
            sfx.correct.play().catch(() => { });
            checkWin();
          }
        }
      });

      if (!placed && e.clientY > poolRect.top) {
        pool.appendChild(activeCard);
        placed = true;
      }
      if (!placed) startParent.appendChild(activeCard);

      activeCard.classList.remove('dragging');
      activeCard.style = '';
      activeCard = null;
      activePointerId = null;
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onEnd);
    }

    // ─── CHECK WIN ────────────────────────────────────────────────────────────────
    function checkWin() {
      if (userProgress.every((val, i) => val === currentSentenceData.en[i])) {
        score += 50;
        document.getElementById('score').textContent = score;

        confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 } });

        const hintEl = document.getElementById('hint-text');
        hintEl.textContent = '🎉 Chính xác! Tuyệt vời!';
        hintEl.className = 'info-hint success';

        document.querySelectorAll('.word-slot').forEach(s => s.classList.add('correct-blink'));

        sfx.correct.currentTime = 0;
        sfx.correct.play().catch(() => { });

        // FEATURE 2: unlock the Next button once the sentence is correct
        document.getElementById('btn-next').disabled = false;

        // Speak the full completed sentence aloud
        if (window.speechSynthesis) {
          const utt = new SpeechSynthesisUtterance(currentSentenceData.en.join(' '));
          utt.lang = 'en-US';
          utt.rate = 0.9;
          utt.pitch = 1;
          const voices = window.speechSynthesis.getVoices();
          const enVoice = voices.find(v => v.lang === 'en-US') ||
            voices.find(v => v.lang === 'en-GB') ||
            voices.find(v => v.lang.startsWith('en'));
          if (enVoice) utt.voice = enVoice;
          window.speechSynthesis.cancel();
          window.speechSynthesis.speak(utt);
        }
      }
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────────
    // FEATURE 3: pre-load voices on page start (required by some Android Chrome versions)
    if (window.speechSynthesis) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.addEventListener('voiceschanged', () => {
        window.speechSynthesis.getVoices(); // cache voices once loaded
      });
    }
    nextLevel();
  </script>
